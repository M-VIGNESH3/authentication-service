name: CI Security Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  sonar-quality:
    name: SonarCloud Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ github.repository }}

      - name: Sonar Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Notify Sonar Failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ Sonar Quality Gate Failed for '${{ github.repository }}'"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

  snyk-sca:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    needs: sonar-quality

    steps:
      - uses: actions/checkout@v4

      - name: Snyk Open Source Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: test --severity-threshold=medium

      - name: Notify Snyk Failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ Snyk SCA failed – vulnerabilities found in '${{ github.repository }}'"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: snyk-sca

    steps:
      - uses: actions/checkout@v4

      - name: Docker Build
        run: |
          docker build -t ${{ github.repository }}:${{ github.sha }} .

  container-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Snyk Container Scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ github.repository }}:${{ github.sha }}
          args: --severity-threshold=medium

      - name: Notify Container Scan Failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ Docker image vulnerabilities (HIGH/MEDIUM) found in '${{ github.repository }}'"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

  push-image:
    name: Push Secure Image
    runs-on: ubuntu-latest
    needs: container-scan

    steps:
      - name: Docker Login
        run: |
          echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Push Image
        run: |
          docker push ${{ github.repository }}:${{ github.sha }}

      - name: Success Notification
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"✅ Secure Docker image pushed successfully: '${{ github.repository }}'"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
