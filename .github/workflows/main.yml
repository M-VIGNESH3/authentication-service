name: SonarCloud Analysis & Quality Gate
 
on:

  push:

    branches: [ "main", "develop" ]

  pull_request:

    types: [opened, synchronize, reopened]
 
jobs:

  sonar-scan:

    runs-on: ubuntu-latest

    steps:

      # Step 1: Checkout with full history (required for Sonar)

      - name: Checkout Code

        uses: actions/checkout@v4

        with:

          fetch-depth: 0
 
      # Step 2: Run the actual Sonar Scan

      - name: SonarCloud Scan

        uses: SonarSource/sonarcloud-github-action@v3.1.0

        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

        with:

          args: >

            -Dsonar.projectKey=your_project_key

            -Dsonar.organization=your_org_name

            -Dsonar.sources=.
 
      # Step 3: Wait for SonarCloud to finish and check the Gate status

      - name: SonarCloud Quality Gate Check

        id: sonarqube-quality-gate-check

        uses: sonarsource/sonarcloud-quality-gate-action@master

        timeout-minutes: 5

        env:

          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
 
      # Step 4: Send email ONLY if the Quality Gate fails

      - name: Send Email on Failure

        if: failure() && steps.sonarqube-quality-gate-check.outcome == 'failure'

        uses: dawidd6/action-send-mail@v3

        with:

          server_address: smtp.gmail.com # Change if using SendGrid/Outlook

          server_port: 465

          username: ${{ secrets.MAIL_USERNAME }}

          password: ${{ secrets.MAIL_PASSWORD }}

          subject: "❌ Quality Gate Failed: ${{ github.repository }}"

          to: your-email@example.com

          from: GitHub Actions CI

          body: |

            The Quality Gate has failed for the latest push.

            Repo: ${{ github.repository }}

            Branch: ${{ github.ref_name }}

            Commit: ${{ github.sha }}

            Check the details on the SonarCloud dashboard.
 
